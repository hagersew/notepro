<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NotePro — Shared annotation</title>
    <style>
      :root {
        color-scheme: dark;
        --np-canvas: #0c0e14;
        --np-surface: #13151f;
        --np-raised: #1a1d2e;
        --np-border: rgba(255, 255, 255, 0.1);
        --np-border-strong: rgba(255, 255, 255, 0.14);
        --np-text: #f1f5f9;
        --np-muted: #94a3b8;
        --np-subtle: #64748b;
        --np-brand-start: #6366f1;
        --np-brand-end: #a855f7;
        --np-accent: #818cf8;
      }
      * {
        box-sizing: border-box;
      }
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          sans-serif;
        margin: 0;
        min-height: 100vh;
        padding: 28px 20px 40px;
        color: var(--np-text);
        line-height: 1.55;
        background-color: var(--np-canvas);
        background-image:
          radial-gradient(ellipse 120% 90% at 50% -25%, rgba(99, 102, 241, 0.22), transparent 52%),
          radial-gradient(ellipse 85% 55% at 100% 0%, rgba(168, 85, 247, 0.12), transparent 48%),
          radial-gradient(ellipse 70% 45% at 0% 100%, rgba(59, 130, 246, 0.08), transparent 50%);
      }
      .shell {
        max-width: 720px;
        margin: 0 auto;
      }
      .card {
        border-radius: 16px;
        padding: 24px 26px;
        background: rgba(19, 21, 31, 0.92);
        border: 1px solid var(--np-border-strong);
        box-shadow:
          0 4px 6px -1px rgba(0, 0, 0, 0.35),
          0 18px 38px -14px rgba(0, 0, 0, 0.55),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      .eyebrow {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        background: linear-gradient(90deg, var(--np-brand-start), var(--np-brand-end));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        margin-bottom: 12px;
      }
      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 16px;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 500;
        background: rgba(0, 0, 0, 0.35);
        border: 1px solid var(--np-border);
        color: var(--np-muted);
      }
      .badge.cap {
        text-transform: capitalize;
      }
      h1 {
        font-size: 1.35rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        margin: 0 0 12px;
        line-height: 1.25;
      }
      .source {
        font-size: 13px;
        word-break: break-all;
        margin-bottom: 20px;
      }
      .source a {
        color: var(--np-accent);
        text-decoration: none;
        border-bottom: 1px solid rgba(129, 140, 248, 0.35);
      }
      .source a:hover {
        border-bottom-color: var(--np-accent);
      }
      .quote-label {
        font-size: 11px;
        font-weight: 600;
        color: var(--np-subtle);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 8px;
      }
      blockquote {
        margin: 0 0 22px;
        padding: 14px 16px;
        border-radius: 12px;
        border-left: 4px solid var(--np-brand-start);
        background: rgba(0, 0, 0, 0.28);
        border: 1px solid var(--np-border);
        border-left-width: 4px;
        color: var(--np-muted);
        font-style: italic;
      }
      .note-label {
        font-size: 11px;
        font-weight: 600;
        color: var(--np-subtle);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 8px;
      }
      .note {
        font-size: 14px;
        white-space: pre-wrap;
        color: var(--np-text);
      }
      .note-empty {
        font-size: 14px;
        color: var(--np-subtle);
      }
      .error {
        color: #f87171;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="card" id="root"></div>
    </div>
    <script>
      function decodeBase64UrlJson(hash) {
        var b64 = hash.replace(/-/g, '+').replace(/_/g, '/')
        while (b64.length % 4) b64 += '='
        var binary = atob(b64)
        var bytes = new Uint8Array(binary.length)
        for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i)
        var json = new TextDecoder().decode(bytes)
        return JSON.parse(json)
      }

      var root = document.getElementById('root')
      var raw = location.hash.replace(/^#/, '')
      if (!raw) {
        root.innerHTML = '<p class="error">Missing payload in URL hash.</p>'
      } else {
        try {
          var data = decodeBase64UrlJson(raw)
          var color = data.color || ''
          var title = data.title || 'Untitled page'
          var url = data.url || ''
          var note = data.note || ''
          var selectedText = data.selectedText || ''
          var createdAt = data.createdAt ? new Date(data.createdAt).toLocaleString() : ''

          root.innerHTML =
            '<div class="eyebrow">NotePro</div>' +
            '<div class="meta">' +
            (color
              ? '<span class="badge cap">' + escapeHtml(color) + '</span>'
              : '') +
            (createdAt ? '<span class="badge">' + escapeHtml(createdAt) + '</span>' : '') +
            '</div>' +
            '<h1>' +
            escapeHtml(title) +
            '</h1>' +
            '<p class="source"><a href="' +
            escapeAttr(url) +
            '" target="_blank" rel="noreferrer">' +
            escapeHtml(url) +
            '</a></p>' +
            '<div class="quote-label">Highlighted</div>' +
            '<blockquote>“' +
            escapeHtml(selectedText) +
            '”</blockquote>' +
            '<div class="note-label">Note</div>' +
            (note
              ? '<div class="note">' + escapeHtml(note) + '</div>'
              : '<p class="note-empty">No note attached.</p>')
        } catch (e) {
          root.innerHTML =
            '<p class="error">Could not read share payload. It may be truncated or invalid.</p>'
        }
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
      }
      function escapeAttr(s) {
        return String(s).replace(/"/g, '&quot;')
      }
    </script>
  </body>
</html>
